<h1>プライバシーポリシー</h1>

<p>本アプリ「Dream Nudger」は、ユーザーのプライバシーを尊重します。</p>

<h2>収集する情報</h2>
<ul>
<li>投稿内容</li>
<li>利用状況</li>
<li>広告識別子</li>
</ul>

<h2>利用目的</h2>
<ul>
<li>サービス提供</li>
<li>広告表示</li>
</ul>

<h2>第三者サービス</h2>
<p>本アプリはGoogle FirebaseおよびAdMobを利用します。</p>

<h2>広告について</h2>
<p>広告が表示されます。</p>

<hr>

<h1>利用規約</h1>

<h2>禁止事項</h2>
<ul>
<li>違法行為</li>
<li>誹謗中傷</li>
<li>不適切な投稿</li>
</ul>

<h2>投稿の管理</h2>
<p>運営は投稿を削除する場合があります。</p>

<h2>広告</h2>
<p>広告視聴により機能が解放される場合があります。</p>

</body>
